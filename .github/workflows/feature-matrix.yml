name: feature-matrix
on: [push, pull_request]
jobs:
  # Lint gate: clippy with all features on across the whole tree (lib +
  # bin + integration tests). `--no-deps` skips upstream-crate lints we
  # can't fix; `-D warnings` makes any clippy warning a CI failure so the
  # tree stays lint-clean. The crate-level
  # `#![allow(clippy::should_implement_trait)]` in `src/lib.rs` covers
  # the deliberate inherent `from_str` methods on enum slug types.
  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: cargo clippy --all-features (-D warnings)
        run: cargo clippy --all-features --tests --no-deps -- -D warnings

  # Docs gate: full `--all-features` rustdoc build with intra-doc-link
  # resolution enforced (`-D warnings` upgrades unresolved-link /
  # broken-link / private-item-link lints to errors). Keeps the
  # docs.rs surface — which is built with all features — usable.
  doc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - name: cargo doc --all-features (-D warnings)
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --all-features --no-deps

  # `cargo hack` matrix that verifies the crate builds and tests pass across
  # the feature combinations consumers actually use. The existing `codegen`
  # job covers `--no-default-features` / default / `--all-features`; this
  # extends that with per-feature isolation + a representative powerset so
  # regressions like "a `sqlx-mysql`-only dep snuck in without gating" surface
  # in CI rather than at a downstream consumer's build.
  cargo-hack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      # `mediaschema` itself has no build.rs / protoc dependency at run-time
      # (the buffa codegen output is committed under `src/generated/`); we
      # don't need `arduino/setup-protoc` here.
      - name: Install cargo-hack
        run: cargo install cargo-hack --locked
      # Per-feature isolation: every feature builds on its own (on top of
      # the always-required `alloc`) without implicitly depending on any
      # other feature. Catches missing `cfg(feature = ...)` gates and
      # `Default`/inherent-impl rule violations under single-feature
      # builds. `--features alloc` floors the matrix: the domain needs
      # alloc (Vec/String throughout), so the pure-core
      # `--no-default-features` baseline is not a buildable target.
      - name: cargo hack check --each-feature (alloc floor)
        run: cargo hack check --each-feature --features alloc --no-dev-deps
      # Spot-check the medium-aggregate gates (`video` / `audio` /
      # `subtitle`) so a regression that needs a sibling medium to
      # compile surfaces on its own — `cargo hack`'s powerset below
      # also covers these, but these explicit lanes give a clearer
      # signal on which medium broke.
      - name: build std + video only
        run: cargo check --no-default-features --features std,video
      - name: build std + audio only
        run: cargo check --no-default-features --features std,audio
      - name: build std + subtitle only
        run: cargo check --no-default-features --features std,subtitle
      - name: build std alone (no medium aggregates)
        run: cargo check --no-default-features --features std
      # Representative powerset (depth 2) with one scope-reducing flag:
      #
      #   --group-features sqlx-postgres,sqlx-mysql,sqlx-sqlite
      #     The three sqlx-dialect features are mutually compatible and the
      #     interesting combos are "any sqlx + buffa", "any sqlx + json",
      #     etc. Treating them as a single group keeps the matrix focused on
      #     the cross-feature surface.
      - name: cargo hack check --feature-powerset
        run: |
          cargo hack check --feature-powerset --depth 2 \
            --group-features sqlx-postgres,sqlx-mysql,sqlx-sqlite \
            --no-dev-deps
      # Powerset tests with the same scope reduction. `--skip default`
      # avoids re-running the default-features test case (already covered
      # by `codegen.yml`'s `test-matrix` job).
      #
      # `--features std` forces `std` on for every powerset combo: tests
      # require std unconditionally (libtest is std-only, and our fixture
      # helpers use `Uuid7::new()` / `jiff::Timestamp::now()` which are
      # `cfg(feature = "std")`-gated). The `check --feature-powerset`
      # step above still exercises the no-std combos against the library
      # surface — the test step here only covers combos where running
      # tests is actually possible. `--skip alloc` drops the dedicated
      # `alloc`-only combo (std-implied-alloc still gives heap coverage).
      - name: cargo hack test --feature-powerset
        run: |
          cargo hack test --feature-powerset --depth 2 \
            --group-features sqlx-postgres,sqlx-mysql,sqlx-sqlite \
            --features std \
            --skip default,alloc
