name: feature-matrix
on: [push, pull_request]
jobs:
  # `cargo hack` matrix that verifies the crate builds and tests pass across
  # the feature combinations consumers actually use. The existing `codegen`
  # job covers `--no-default-features` / default / `--all-features`; this
  # extends that with per-feature isolation + a representative powerset so
  # regressions like "a `sqlx-mysql`-only dep snuck in without gating" surface
  # in CI rather than at a downstream consumer's build.
  cargo-hack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      # `mediaschema` itself has no build.rs / protoc dependency at run-time
      # (the buffa codegen output is committed under `src/generated/`); we
      # don't need `arduino/setup-protoc` here.
      - name: Install cargo-hack
        run: cargo install cargo-hack --locked
      # Per-feature isolation: every feature builds on its own without
      # implicitly depending on any other feature. Catches missing
      # `cfg(feature = ...)` gates and `Default`/inherent-impl rule
      # violations under single-feature builds.
      - name: cargo hack check --each-feature
        run: cargo hack check --each-feature --no-dev-deps
      # Spot-check the medium-aggregate gates (`video` / `audio` /
      # `subtitle`) so a regression that needs a sibling medium to
      # compile surfaces on its own — `cargo hack`'s powerset below
      # also covers these, but these explicit lanes give a clearer
      # signal on which medium broke.
      - name: build std + video only
        run: cargo check --no-default-features --features std,video
      - name: build std + audio only
        run: cargo check --no-default-features --features std,audio
      - name: build std + subtitle only
        run: cargo check --no-default-features --features std,subtitle
      - name: build std alone (no medium aggregates)
        run: cargo check --no-default-features --features std
      # Representative powerset (depth 2) with one scope-reducing flag:
      #
      #   --group-features sqlx-postgres,sqlx-mysql,sqlx-sqlite
      #     The three sqlx-dialect features are mutually compatible and the
      #     interesting combos are "any sqlx + buffa", "any sqlx + json",
      #     etc. Treating them as a single group keeps the matrix focused on
      #     the cross-feature surface.
      - name: cargo hack check --feature-powerset
        run: |
          cargo hack check --feature-powerset --depth 2 \
            --group-features sqlx-postgres,sqlx-mysql,sqlx-sqlite \
            --no-dev-deps
      # Powerset tests with the same scope reduction. `--skip default`
      # avoids re-running the default-features test case (already covered
      # by `codegen.yml`'s `test-matrix` job).
      - name: cargo hack test --feature-powerset
        run: |
          cargo hack test --feature-powerset --depth 2 \
            --group-features sqlx-postgres,sqlx-mysql,sqlx-sqlite \
            --skip default
