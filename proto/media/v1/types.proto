// ── Batch 2: audio scalar leaves (§6.5 leaves table) ────────────────────────

message TagConfidence { string label = 1; float confidence = 2; }

message SoundSource {
  string name = 1;
  string prominence = 2;
  string description = 3;
}

message AudioEvent {
  string event_type = 1;
  uint32 start_ms = 2;
  uint32 end_ms = 3;
  float avg_confidence = 4;
}

message SpeakerSegment {
  uint32 start_ms = 1;
  uint32 end_ms = 2;
  uint32 speaker_id = 3;
}

message AudioTranscriptSegment {
  uint32 start_ms = 1;
  uint32 end_ms = 2;
  string text = 3;
  string language = 4;
  float confidence = 5;
}

message AudioChannelSpec {
  uint32 index = 1;
  uint32 raw_id = 2;
  string label = 3;
}

message Chromaprint {
  bytes fingerprint = 1;
  double fingerprint_duration = 2;
}

message Ebur128 {
  float loudness_lufs = 1;
  float loudness_range_lu = 2;
  float true_peak_dbtp = 3;
}

message Timecode {
  string start = 1;
  string end = 2;
  float fps = 3;
  bool drop_frame = 4;
}

// `tag` is the src `CedTag` u64 newtype inlined as fixed64 (wire
// SixtyFourBit, §6.2/§6.8 #4) — soundevents dataset code.
message CedDetection {
  fixed64 tag = 1;
  float confidence = 2;
}

message Ced { repeated CedDetection tags = 1; }

// ── Batch 3: composite audio leaves + reuse-only wrappers (§6.5/§6.2) ────────

message AudioChannelLayout {
  AudioChannelOrderKind order = 1;
  uint32 channels = 2;
  ChannelLayoutKind known_kind = 3;
  optional uint64 native_mask = 4;
  repeated AudioChannelSpec custom_channels = 5;
  string description = 6;
}

// clap.rs's 5 transparent single-Detection newtypes
// (AudioDetection/AudioSceneDetection/AudioMoodDetection/VoiceDetection/
// SoundEvent) are NOT emitted — each slot references Detection
// directly (§6.2).
message Clap {
  optional Detection audio_detection = 1;
  optional Detection scene = 2;
  optional Detection mood = 3;
  optional Detection voice = 4;
  repeated Detection sound_events = 5;
}

message TrackTag {
  string category = 1;
  repeated Detection detections = 2;
  string source = 3;
}

// ── Batch 4: non-audio meta blocks (§6.5 non-audio table) ───────────────────

message VideoMeta {
  bytes id = 1;
  string name = 2;
  VideoFormat format = 3;
  Dimensions dimensions = 4;
  uint64 size = 5;
  TrackTime time = 6;
  double frame_rate = 7;
  uint64 bit_rate = 8;
  int64 created_at = 9;
}

message VideoTrackMeta {
  bytes id = 1;
  uint32 ordinal = 2;
  uint32 stream_index = 3;
  optional uint64 container_track_id = 4;
  TrackTime time = 5;
}

message VideoStreamMeta {
  CodecId codec_id = 1;
  Dimensions dimensions = 2;
  int64 total_pts = 3;
  double frame_rate = 4;
  uint64 bit_rate = 5;
  mediatime.v1.Timebase time_base = 6;
}

// Per-copy metadata `name` (field 3) and `created_at` (field 6) were
// removed when the domain split content (`Media`) from physical copy
// (`MediaFile`) — those concerns now live on the `MediaFile` message
// below.
message MediaMeta {
  bytes id = 1;
  bytes checksum = 2;
  uint64 size = 3;
  TrackTime time = 4;
}

// Per-copy file record. N MediaFiles may point at one Media (same content,
// multiple physical copies on disk). `created_at` is the filesystem birth
// time, ms since epoch; legacy `0` sentinel = absent (the wire-decode
// adapter collapses it to `None`). `watch_volume` is carried on the wire
// so a single message round-trips losslessly — the bridge is 1:1 and does
// not join WatchedLocation to re-derive the volume from `watched_location_id`.
message MediaFile {
  bytes id = 1;
  bytes media_id = 2;
  int64 created_at = 3;
  Location location = 4;
  bytes watched_location_id = 5;
  bytes watch_volume = 6;
}

message SceneMeta {
  bytes id = 1;
  bytes video_id = 2;
  mediatime.v1.TimeRange range = 3;
  int64 created_at = 4;
  bytes video_track_id = 5;
}

message SubtitleMeta {
  bytes id = 1;
  int64 created_at = 2;
}

message SubtitleTrackMeta {
  bytes id = 1;
  uint32 ordinal = 2;
  optional uint32 stream_index = 3;
  optional uint64 container_track_id = 4;
  TrackTime time = 5;
}

// Rust enum-with-data -> message + oneof (§6.2). `kind` mirrors the src
// discriminant: 0=Unspecified, 1=Embedded, 2=Sidecar,
// 3=GeneratedWhisper(source_audio_track_id),
// 4=GeneratedOcr(source_subtitle_track_id). The two id payloads are the
// oneof arms (tags 2/3 mirror the hand-rolled wire layout).
message SubtitleTrackOrigin {
  uint32 kind = 1;
  oneof source {
    bytes source_audio_track_id = 2;
    bytes source_subtitle_track_id = 3;
  }
}

message FailedFile {
  bytes id = 1;
  bytes media_id = 2;
  bytes location_id = 3;
  int64 failed_at = 4;
}

// ── Batch 5: non-audio track/record wrappers (§6.5 non-audio table) ─────────

// `index_status` bits (VideoIndexStatus, §6.4): PROBED=0x01,
// SCENE_DETECTED=0x02, KEYFRAME_EXTRACTED=0x04, VLM_ANALYZED=0x10,
// APPLE_VISION_ANALYZED=0x20, TEXT_EMBEDDING_FINISHED=0x40,
// SCENE_EMBEDDING_FINISHED=0x80 (src gap at 0x08).
message Video {
  VideoMeta meta = 1;
  repeated bytes scenes = 2;
  uint32 index_status = 3;
  optional ErrorInfo index_error = 4;
  uint32 error_status = 5;
}

// `disposition` bits (VideoTrackDisposition, §6.4): DEFAULT=0x1, DUB=0x2,
// ORIGINAL=0x4, COMMENT=0x8, LYRICS=0x10, KARAOKE=0x20, FORCED=0x40,
// HEARING_IMPAIRED=0x80, VISUAL_IMPAIRED=0x100, CLEAN_EFFECTS=0x200,
// ATTACHED_PIC=0x400, TIMED_THUMBNAILS=0x800, NON_DIEGETIC=0x1000
// (gap at 0x2000-0x8000), CAPTIONS=0x10000, DESCRIPTIONS=0x20000,
// METADATA=0x40000, DEPENDENT=0x80000, STILL_IMAGE=0x100000,
// MULTILAYER=0x200000.
message VideoTrack {
  VideoTrackMeta meta = 1;
  VideoStreamMeta stream = 2;
  uint32 disposition = 3;
  bool is_primary = 4;
  bool auto_selected = 5;
  string selection_reason = 6;
  bytes video_id = 7;
  optional ErrorInfo index_error = 8;
}

// `index_status` bits (MediaIndexStatus, §6.4): PROBED=0x01,
// VIDEO_INDEXED=0x02, AUDIO_INDEXED=0x04, SUBTITLE_INDEXED=0x08.
message Media {
  MediaMeta meta = 1;
  DbMediaKind kind = 2;
  uint32 index_status = 3;
  optional ErrorInfo index_error = 4;
  optional bytes video_id = 5;
  optional bytes audio_id = 6;
  optional bytes subtitle_id = 7;
  uint32 error_status = 8;
  int64 capture_date = 9;
  string device_make = 10;
  string device_model = 11;
  string gps_location = 12;
}

// `index_status` bits (SubtitleIndexStatus, §6.4): TRACKS_DISCOVERED=0x01,
// CUES_EXTRACTED=0x02, OCR_DONE=0x04, SEARCH_INDEXED=0x08.
message Subtitle {
  SubtitleMeta meta = 1;
  uint32 index_status = 2;
  optional ErrorInfo index_error = 3;
}

// `disposition` bits (SubtitleTrackDisposition, §6.4): DEFAULT=0x1, DUB=0x2,
// ORIGINAL=0x4, COMMENT=0x8, LYRICS=0x10, KARAOKE=0x20, FORCED=0x40,
// HEARING_IMPAIRED=0x80, VISUAL_IMPAIRED=0x100, CLEAN_EFFECTS=0x200,
// ATTACHED_PIC=0x400, TIMED_THUMBNAILS=0x800, NON_DIEGETIC=0x1000
// (gap at 0x2000-0x8000), CAPTIONS=0x10000, DESCRIPTIONS=0x20000,
// METADATA=0x40000, DEPENDENT=0x80000, STILL_IMAGE=0x100000,
// MULTILAYER=0x200000.
message SubtitleTrack {
  SubtitleTrackMeta meta = 1;
  bytes subtitle_id = 2;
  SubtitleTrackOrigin origin = 3;
  SubtitleTrackFormat format = 4;
  SubtitleTrackRole role = 5;
  string language = 6;
  string title = 7;
  CodecId codec_id = 8;
  uint32 disposition = 9;
  bool is_primary = 10;
  bool auto_selected = 11;
  string selection_reason = 12;
  optional ErrorInfo index_error = 13;
}

// Polymorphic subtitle cue — base fields plus a `data` oneof carrying the
// per-format payload (mirrors the domain `SubtitleCue<Id, D>` shape).
//
// `kind` is the closed [`SubtitleCueKind`] discriminator (the per-format
// data oneof MUST match; mismatch is rejected at the bridge). PTS only on
// the wire — timebase lives on the parent `SubtitleTrack` (timebase-dedup).
message SubtitleCue {
  bytes id = 1;
  bytes subtitle_track_id = 2;
  uint64 ordinal = 3;
  int64 span_start_pts = 4;
  int64 span_end_pts = 5;
  string text = 6;
  SubtitleCueKind kind = 7;
  oneof data {
    SrtData srt = 8;
    VttData vtt = 9;
    AssData ass = 10;
    LrcData lrc = 11;
    MicroDvdData micro_dvd = 12;
    SubViewerData sub_viewer = 13;
    SbvData sbv = 14;
    TtmlData ttml = 15;
    SamiData sami = 16;
    VobSubData vob_sub = 17;
    PgsData pgs = 18;
    Cea608Data cea_608 = 19;
    EbuStlData ebu_stl = 20;
  }
}

// Closed discriminator for [`SubtitleCue`]'s `data` payload. Numbering is
// 1:1 with the domain `SubtitleCueKind` `repr(u8)` (no leading
// `UNSPECIFIED = 0` — every value is a real format, including SRT at 0).
enum SubtitleCueKind {
  SUBTITLE_CUE_KIND_SRT = 0;
  SUBTITLE_CUE_KIND_VTT = 1;
  SUBTITLE_CUE_KIND_ASS = 2;
  SUBTITLE_CUE_KIND_MICRO_DVD = 3;
  SUBTITLE_CUE_KIND_SUB_VIEWER = 4;
  SUBTITLE_CUE_KIND_SBV = 5;
  SUBTITLE_CUE_KIND_LRC = 6;
  SUBTITLE_CUE_KIND_TTML = 7;
  SUBTITLE_CUE_KIND_SAMI = 8;
  SUBTITLE_CUE_KIND_VOB_SUB = 9;
  SUBTITLE_CUE_KIND_PGS = 10;
  SUBTITLE_CUE_KIND_CEA_608 = 11;
  SUBTITLE_CUE_KIND_EBU_STL = 12;
}

// SubRip unit marker — SRT has no per-format detail (text rides on the
// base `SubtitleCue.text` field).
message SrtData {}

// WebVTT per-cue payload.
message VttData {
  string cue_identifier = 1;
  optional VttVertical vertical = 2;
  string line_value = 3;
  optional VttLineAlign line_align = 4;
  string position_value = 5;
  optional VttPositionAlign position_align = 6;
  optional float size_value = 7;
  optional VttTextAlign text_align = 8;
  bytes region_id = 9;
  string voice = 10;
  string styled_text = 11;
}

// ASS/SSA Dialogue payload.
message AssData {
  int32 layer = 1;
  bytes style_id = 2;
  string name = 3;
  int32 margin_l = 4;
  int32 margin_r = 5;
  int32 margin_v = 6;
  string effect = 7;
  string styled_text = 8;
}

// LRC per-cue payload — `has_word_timing` flags whether companion
// `LrcWord` rows exist for this cue.
message LrcData {
  bool has_word_timing = 1;
}

// One word of an LRC (Enhanced) cue (sibling rows of an LRC `SubtitleCue`).
message LrcWord {
  bytes subtitle_cue_id = 1;
  uint32 ordinal = 2;
  string text = 3;
  int64 start_pts = 4;
}

enum VttVertical {
  VTT_VERTICAL_LR = 0;
  VTT_VERTICAL_RL = 1;
}

enum VttLineAlign {
  VTT_LINE_ALIGN_START = 0;
  VTT_LINE_ALIGN_CENTER = 1;
  VTT_LINE_ALIGN_END = 2;
}

enum VttPositionAlign {
  VTT_POSITION_ALIGN_START = 0;
  VTT_POSITION_ALIGN_CENTER = 1;
  VTT_POSITION_ALIGN_END = 2;
  VTT_POSITION_ALIGN_LINE_LEFT = 3;
  VTT_POSITION_ALIGN_LINE_RIGHT = 4;
}

enum VttTextAlign {
  VTT_TEXT_ALIGN_START = 0;
  VTT_TEXT_ALIGN_CENTER = 1;
  VTT_TEXT_ALIGN_END = 2;
  VTT_TEXT_ALIGN_LEFT = 3;
  VTT_TEXT_ALIGN_RIGHT = 4;
}

// Per-track WebVTT region.
message VttRegion {
  bytes id = 1;
  bytes subtitle_track_id = 2;
  string name = 3;
  float width = 4;
  uint32 lines = 5;
  float region_anchor_x = 6;
  float region_anchor_y = 7;
  float viewport_anchor_x = 8;
  float viewport_anchor_y = 9;
  bool scroll_up = 10;
}

// One WebVTT `STYLE` block of a track.
message VttStyleBlock {
  bytes id = 1;
  bytes subtitle_track_id = 2;
  uint32 ordinal = 3;
  string css_text = 4;
}

// Per-track ASS/SSA `[V4+ Styles]` row.
message AssStyle {
  bytes id = 1;
  bytes subtitle_track_id = 2;
  string name = 3;
  string fontname = 4;
  float fontsize = 5;
  uint32 primary_colour = 6;
  uint32 secondary_colour = 7;
  uint32 outline_colour = 8;
  uint32 back_colour = 9;
  bool bold = 10;
  bool italic = 11;
  bool underline = 12;
  bool strikeout = 13;
  int32 scale_x = 14;
  int32 scale_y = 15;
  int32 spacing = 16;
  float angle = 17;
  int32 border_style = 18;
  float outline = 19;
  float shadow = 20;
  int32 alignment = 21;
  int32 margin_l = 22;
  int32 margin_r = 23;
  int32 margin_v = 24;
  int32 encoding = 25;
}

// Per-track LRC header metadata. 1:1 with the parent `SubtitleTrack`.
message LrcMetadata {
  bytes subtitle_track_id = 1;
  string title = 2;
  string artist = 3;
  string album = 4;
  string author = 5;
  string creator = 6;
  string length = 7;
  int32 offset_ms = 8;
}

// MicroDVD per-cue payload — inline `{y:i}` codes carried verbatim.
message MicroDvdData {
  string styled_text = 1;
}

// SubViewer per-cue payload — inline `[br]`/`[b]`/`[i]`/`[u]` tags.
message SubViewerData {
  string styled_text = 1;
}

// YouTube SBV unit marker — plain text rides on the base
// `SubtitleCue.text`.
message SbvData {}

// TTML per-cue payload. Optional FKs into per-track region / style
// aggregates, plus the inline XML fragment.
message TtmlData {
  bytes region_id = 1;
  bytes style_id = 2;
  string xml_id = 3;
  string styled_text = 4;
}

// SAMI per-cue payload — `class_name` selects which `SamiStyle` to
// apply; `styled_text` carries the inline HTML-like body.
message SamiData {
  string class_name = 1;
  string styled_text = 2;
}

// Per-track TTML `<region>` element.
message TtmlRegion {
  bytes id = 1;
  bytes subtitle_track_id = 2;
  string xml_id = 3;
  string xml_attrs = 4;
}

// Per-track TTML `<style>` element.
message TtmlStyle {
  bytes id = 1;
  bytes subtitle_track_id = 2;
  string xml_id = 3;
  string xml_attrs = 4;
}

// Per-track SAMI `<STYLE>` class.
message SamiStyle {
  bytes id = 1;
  bytes subtitle_track_id = 2;
  string class_name = 3;
  string css_text = 4;
}

// DVD VobSub per-cue payload — bitmap blob + per-cue geometry + colour
// / contrast indices into the per-track `VobSubPalette`. The 4-entry
// index arrays ride packed as a single fixed-32-bit field (4 × u8
// little-endian) per arm.
message VobSubData {
  bytes palette_id = 1;
  bytes bitmap = 2;
  uint32 width = 3;
  uint32 height = 4;
  int32 pos_x = 5;
  int32 pos_y = 6;
  // `color_indices[0..4]` packed LE: byte0|byte1<<8|byte2<<16|byte3<<24.
  uint32 color_indices = 7;
  // Same packing for the 4-entry contrast index array.
  uint32 contrast_indices = 8;
}

// Blu-ray PGS per-cue payload — bitmap blob + per-cue palette bytes +
// geometry + PGS `composition_state` byte.
message PgsData {
  bytes bitmap = 1;
  uint32 width = 2;
  uint32 height = 3;
  int32 pos_x = 4;
  int32 pos_y = 5;
  bytes palette_bytes = 6;
  uint32 composition_state = 7;
}

// CEA-608 per-cue payload. `channel` is validated 1..=4 at the bridge.
message Cea608Data {
  uint32 channel = 1;
  uint32 pac_byte_pair = 2;
  string styled_text = 3;
}

// EBU STL per-cue payload. `justification` is validated 1..=3 at the
// bridge.
message EbuStlData {
  uint32 subtitle_number = 1;
  bool cumulative = 2;
  int32 vertical_pos = 3;
  uint32 justification = 4;
  string styled_text = 5;
}

// Per-track DVD VobSub palette — 16-entry RGB lookup table (each entry
// is `0x00RRGGBB`). Cues' per-cue `color_indices` / `contrast_indices`
// reference these.
message VobSubPalette {
  bytes id = 1;
  bytes subtitle_track_id = 2;
  repeated uint32 entries = 3;
}

// ── Batch 6: Scene + VLM (§6.5 non-audio table; §6.8 #2 for SceneVlmResult) ──

message Scene {
  SceneMeta meta = 1;
  repeated bytes keyframes = 2;
  string description = 3;
  string shot_type = 4;
  string camera_motion = 5;
  string tags = 6;
  uint32 people_count = 7;
  repeated bytes tag_ids = 8;
  repeated string vision_provider = 9;
  repeated string smart_folders = 10;
}

// Pure-Rust struct (scene_vlm.rs, no hand-rolled Encode); field tags
// 1..11 assigned in struct-declaration order — a clean-redesign choice
// (§2 grants this; no wire-compat to honor). §6.8 #2.
message SceneVlmResult {
  optional string scene = 1;
  optional string description = 2;
  repeated SubjectDetection subjects = 3;
  repeated ObjectDetection objects = 4;
  repeated ActionDetection actions = 5;
  repeated MoodDetection mood = 6;
  optional string shot_type = 7;
  repeated LightingDetection lighting = 8;
  repeated ColorDetection colors = 9;
  repeated string tags = 10;
  repeated ClassificationDetection classifications = 11;
}

// ── Batch 7: Keyframe (§6.5 non-audio table) ────────────────────────────────

message Keyframe {
  bytes id = 1;
  bytes scene_id = 2;
  int64 pts = 3;
  Dimensions dimensions = 4;
  bytes data = 5;
  repeated ClassificationDetection classifications = 6;
  HumanAnalysis humans = 7;
  AnimalAnalysis animals = 8;
  repeated ObjectDetection objects = 9;
  repeated ActionDetection actions = 10;
  repeated MoodDetection mood = 11;
  repeated EmotionDetection emotion = 12;
  repeated LightingDetection lighting = 13;
  repeated ColorDetection colors = 14;
  repeated TextDetection text_detections = 15;
  repeated BarcodeDetection barcodes = 16;
  repeated SaliencyRegion attention_saliency = 17;
  repeated SaliencyRegion objectness_saliency = 18;
  HorizonInfo horizon = 19;
  repeated DocumentSegment document_segments = 20;
  FeaturePrint feature_print = 21;
  Aesthetics aesthetics = 22;
}

// ── Batch 8: audio meta + summary blocks (§6.5 audio aggregates table) ──────

message AudioMeta {
  bytes id = 1;
  string name = 2;
  string container = 3;
  uint64 size = 4;
  TrackTime time = 5;
  int64 created_at = 6;
}

message AudioStreamMeta {
  CodecId codec_id = 1;
  uint32 sample_rate = 2;
  AudioChannelLayout layout = 3;
  uint64 bit_rate = 4;
  string language = 5;
  string stream_title = 6;
  string album = 7;
  string artist = 8;
  string title = 9;
  string genre = 10;
  uint32 track_number = 11;
  string sample_format = 12;
  uint32 bits_per_sample = 13;
}

message AudioTrackMeta {
  bytes id = 1;
  uint32 ordinal = 2;
  uint32 stream_index = 3;
  optional uint64 container_track_id = 4;
  TrackTime time = 5;
}

message AudioSummary {
  AudioPrefilterClass prefilter_class = 1;
  optional TagConfidence audio_type = 2;
  optional TagConfidence scene = 3;
  optional TagConfidence mood = 4;
  optional TagConfidence voice = 5;
  bool has_speech = 6;
  bool has_music = 7;
  string dominant_language = 8;
  float speech_ratio = 9;
  uint32 speaker_count = 10;
  float loudness_lufs = 11;
  float rms_db = 12;
  string transcript_preview = 13;
  uint32 clip_count = 14;
  repeated uint32 fingerprint = 15;
  bool gemini_enhanced = 16;
}

// ── Batch 9: audio aggregates (§6.5 audio aggregates table) ─────────────────

// Source has wide deliberate tag bands (gaps 8–9, 11–19, 25–29, 38–39,
// 43–49, 53–59, 62–69, 73–79, 83–89, 96–99, 102–109). Per §6.8 #3 these
// are semantic groupings, NOT accidental holes: proto3 sparse field
// numbers are emitted verbatim with NO `reserved` (no wire-compat
// constraint; reserving dozens of numbers adds noise with no value).
message AudioAnalysis {
  bytes id = 1;
  bytes audio_id = 2;
  optional bytes scene_id = 3;
  AudioClipKind kind = 4;
  uint32 start_ms = 5;
  uint32 end_ms = 6;
  bytes track_id = 7;
  repeated CedDetection ced_tags = 10;
  optional TagConfidence zs_audio_type = 20;
  optional TagConfidence zs_scene = 21;
  optional TagConfidence zs_mood = 22;
  repeated TagConfidence zs_sound_events = 23;
  optional TagConfidence zs_voice = 24;
  string description_en = 30;
  string description_zh = 31;
  string gemini_scene = 32;
  string gemini_mood = 33;
  repeated SoundSource gemini_sound_sources = 34;
  string gemini_foreground = 35;
  string gemini_background = 36;
  bool gemini_enhanced = 37;
  repeated AudioEvent event_timeline = 40;
  string foreground_layer = 41;
  string background_layer = 42;
  float speech_ratio = 50;
  uint32 speaker_count = 51;
  repeated SpeakerSegment speaker_segments = 52;
  optional TagConfidence voice_gender = 60;
  optional TagConfidence voice_emotion = 61;
  string transcript = 70;
  repeated AudioTranscriptSegment transcript_segments = 71;
  string language = 72;
  optional TagConfidence music_genre = 80;
  optional float music_bpm = 81;
  repeated TagConfidence music_instruments = 82;
  float loudness_lufs = 90;
  float rms_db = 91;
  optional float snr_db = 92;
  bool has_sudden_onset = 93;
  string energy_profile = 94;
  float spectral_flatness = 95;
  repeated uint32 fingerprint = 100;
  AudioPrefilterClass prefilter_class = 101;
  bool has_speech = 110;
  bool has_music = 111;
}

// `language` is the src Iso6392B u32 newtype inlined as uint32 (varint,
// §6.2/§6.8 #4). `stop_reason` bits (StopReason, §6.4): TIMECODE=0x01,
// SILENT=0x02, FLATNESS=0x04, NO_SPEECH=0x08, LLM_NO_NET=0x10,
// LLM_NO_CREDIT=0x20. `index_status` bits (ProcessingStage, §6.4):
// EXTRACTED=0x01, CLASSIFIED=0x02, VAD_DONE=0x04, STT_DONE=0x08,
// SPEAKER_DONE=0x10, LLM_DONE=0x20, TEXT_EMBED=0x40, CED_DONE=0x80,
// CLAP_DONE=0x100, EBUR128_DONE=0x200, FPRINT_DONE=0x400. Source 1000s/
// 2000s bands preserved verbatim; gap at 17 reserved (§6.8 #3).
message TrackRecord {
  bytes id = 1;
  bytes audio_id = 2;
  uint32 track_index = 3;
  AudioCodec codec = 4;
  AudioSampleFormat sample_format = 5;
  uint32 sample_rate = 6;
  uint32 channels = 7;
  ChannelLayoutKind channel_layout = 8;
  uint64 bit_rate = 9;
  uint32 bit_depth = 10;
  int64 total_pts = 11;
  mediatime.v1.Timebase time_base = 12;
  uint32 language = 13;
  optional Timecode timecode = 14;
  TrackClassificationType classification = 15;
  uint32 stop_reason = 16;
  repeated TrackTag tags = 17;
  optional Ebur128 ebur_128 = 1000;
  optional Clap clap = 1001;
  optional Ced ced = 1002;
  optional Chromaprint chromaprint = 1003;
  uint32 index_status = 2000;
  optional ErrorInfo index_error = 2001;
  uint32 error_status = 2002;
}

// `index_status` bits (AudioIndexStatus, §6.4): PROBED=0x01,
// ANALYZED_LOCAL=0x02, TRANSCRIPTED=0x04, GEMINI_ENHANCED=0x08,
// AUDIO_EMBEDDING_FINISHED=0x10, DESCRIPTION_EMBEDDING_FINISHED=0x20.
message Audio {
  AudioMeta meta = 1;
  repeated bytes analyses = 2;
  AudioSummary summary = 3;
  uint32 index_status = 4;
  optional ErrorInfo index_error = 5;
}

// `disposition` bits (AudioTrackDisposition, §6.4): DEFAULT=0x1, DUB=0x2,
// ORIGINAL=0x4, COMMENT=0x8, LYRICS=0x10, KARAOKE=0x20, FORCED=0x40,
// HEARING_IMPAIRED=0x80, VISUAL_IMPAIRED=0x100, CLEAN_EFFECTS=0x200,
// ATTACHED_PIC=0x400, TIMED_THUMBNAILS=0x800, NON_DIEGETIC=0x1000
// (gap at 0x2000-0x8000), CAPTIONS=0x10000, DESCRIPTIONS=0x20000,
// METADATA=0x40000, DEPENDENT=0x80000, STILL_IMAGE=0x100000,
// MULTILAYER=0x200000.
message AudioTrack {
  AudioTrackMeta meta = 1;
  AudioStreamMeta stream = 2;
  uint32 disposition = 3;
  AudioTrackRole role = 4;
  bool is_primary = 5;
  bool auto_selected = 6;
  string selection_reason = 7;
  bytes audio_id = 8;
  optional ErrorInfo index_error = 9;
}

// ── Batch 10: audio file record (§6.5 audio aggregates table; §6.8 #1) ──────

message AudioCoverArt {
  optional Location path = 1;
  string mime = 2;
  optional Dimensions dimensions = 3;
  uint32 size = 4;
}

message AudioFileRecord {
  bytes id = 1;
  optional bytes checksum = 2;
  string name = 3;
  AudioFormat format = 4;
  uint64 size = 5;
  int64 total_pts = 6;
  double frame_rate = 7;
  uint64 bit_rate = 8;
  mediatime.v1.Timebase time_base = 9;
  AudioContainerFormat container_format = 10;
  uint32 stream_count = 11;
  string title = 12;
  string artist = 13;
  string album_artist = 14;
  string album = 15;
  string genre = 16;
  string composer = 17;
  string performer = 18;
  string date = 19;
  uint32 track_number = 20;
  uint32 total_tracks = 21;
  uint32 disc_number = 22;
  uint32 total_discs = 23;
  string comment = 24;
  string lyrics = 25;
  repeated string tag_types = 26;
  optional AudioCoverArt cover_art = 27;
  int64 created_at = 28;
}

// ── SP3: findit `network` domain (consolidated into media.v1) ──
// findit-proto's src/network/ Rust as a clean proto3 redesign (NO wire-compat
// with the hand-rolled framing/encoding; correctness = round-trip + semantic
// fidelity).
//
// Same-package (media.v1) since the mono-consolidation; the SP3 `FailedFile` message is named `NetFailedFile` to avoid colliding with SP2's `FailedFile` DB record.

// Task-0 codegen smoke fixture (NOT a domain message): proves the SP3 same-package
// (media.v1) refs and the mediatime.v1.TimeRange extern, all resolving in a single
// buffa codegen run. Kept permanently: it is the permanent regression guard for the
// SP3 same-package pipeline (mirrors SP0's TimedDetection / SP2's Sp2CodegenSmoke
// fixture role).
message Sp3CodegenSmoke {
  bytes id = 1;                              // inline-bytes id convention (§7.1)
  ErrorInfo error = 2;              // same-package ref (was cross-package media.v1)
  VideoMeta video_meta = 3;     // same-package ref (VideoMeta, SP2 DB domain)
  optional mediatime.v1.TimeRange range = 4; // mediatime extern (-> ::mediatime)
}

// ── Batch 1: scalar leaves (§7.5 shared.rs/heartbeat.rs) ────────────────────

// `limit`: client default 50 when absent (documented client-side
// convention, NOT `optional` — the wire format carries no presence bit;
// §7.8 #9). `offset` default 0.
message Pagination {
  uint32 limit = 1;
  uint32 offset = 2;
}

// `weight`: client default 1.0 when absent (documented client-side
// convention, NOT `optional`; §7.8 #9).
message SearchFilter {
  string key = 1;
  string value = 2;
  float weight = 3;
}

// Unix epoch milliseconds.
message HeartbeatRequest { int64 timestamp = 1; }

// Unix epoch milliseconds.
message HeartbeatResponse { int64 timestamp = 1; }

// ── Batch 2: reuse-only leaves (§7.5 shared.rs) ─────────────────────────────

// `scene_id`/`video_id`: inline bytes (Id convention, §7.1). `range`:
// mediatime.v1.TimeRange extern (-> ::mediatime). `dimensions`:
// Dimensions (SP1 split uint32 width/height; source packed u32
// via to_u32() — clean-redesign, §7.8 #8).
message SearchHit {
  bytes scene_id = 1;
  bytes video_id = 2;
  string video_name = 3;
  Location location = 4;
  string description = 5;
  float score = 6;
  mediatime.v1.TimeRange range = 7;
  bytes thumbnail = 8;
  Dimensions dimensions = 9;
}

// `meta`: VideoMeta (SP2 DB domain, same-package). `scene_count`
// src u16 varint -> uint32. `thumbnail`: inline bytes.
message BrowseItem {
  VideoMeta meta = 1;
  Location location = 2;
  uint32 scene_count = 3;
  bytes thumbnail = 4;
}

// `status`: bare u32 enum-by-convention (NOT a proto enum, §7.3) —
// 0=not_downloaded, 1=downloading, 2=ready, 3=error. Values outside this
// set round-trip exactly (the migration's correctness criterion).
message ModelInfo {
  string name = 1;
  uint32 status = 2;
  uint64 size_bytes = 3;
}

// `status`: bare u32 enum-by-convention (NOT a proto enum, §7.3) —
// 0=pending, 1=downloading, 2=paused, 3=completed, 4=error (distinct
// value set from ModelInfo.status; documentary only). `progress` 0.0–1.0.
message ModelDownloadProgress {
  string name = 1;
  float progress = 2;
  uint64 downloaded_bytes = 3;
  uint64 total_bytes = 4;
  uint32 status = 5;
  string error_msg = 6;
}

// `kind`: bare u32 enum-by-convention (NOT a proto enum, §7.3) — 0=video,
// 1=audio. `error_status`/`index_status`: inline uint32 VideoIndexStatus
// (SP2 bitflag reused by-value, §7.4) — bits: PROBED=0x01,
// SCENE_DETECTED=0x02, KEYFRAME_EXTRACTED=0x04, VLM_ANALYZED=0x10,
// APPLE_VISION_ANALYZED=0x20, TEXT_EMBEDDING_FINISHED=0x40,
// SCENE_EMBEDDING_FINISHED=0x80 (source gap at 0x08). DISTINCT type from
// NetFailedFile (the distinct package disambiguates, §7.1).
message NetFailedFile {
  uint32 kind = 1;
  Location location = 2;
  ErrorInfo error = 3;
  uint32 error_status = 4;
  uint32 index_status = 5;
}

// `completed_phases`: inline uint32 VideoIndexStatus (SP2 bitflag reused
// by-value, §7.4) — bits: PROBED=0x01, SCENE_DETECTED=0x02,
// KEYFRAME_EXTRACTED=0x04, VLM_ANALYZED=0x10, APPLE_VISION_ANALYZED=0x20,
// TEXT_EMBEDDING_FINISHED=0x40, SCENE_EMBEDDING_FINISHED=0x80 (src gap
// at 0x08).
message IndexingFile {
  Location location = 1;
  string name = 2;
  uint32 completed_phases = 3;
}

// ── Batch 3: empty + simple request/response leaves (§7.5 folder.rs/
//    volume_eject.rs/file.rs/daemon.rs/model.rs/search.rs/browse.rs/annotation.rs) ────

// Empty request (zero fields) — the discriminant alone carries intent.
