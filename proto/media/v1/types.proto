syntax = "proto3";

package media.v1;

// Shapes are authored from findit-proto's Rust structs but are a clean
// redesign: wire compatibility with findit-proto's hand-rolled encoding is a
// deliberate NON-goal (correctness / round-trip only).

import "mediatime/v1/mediatime.proto";

// Classification result: a label and its confidence score.
message Detection {
  string label = 1;
  float confidence = 2;
}

// Normalized image rectangle (x, y, width, height in [0, 1]).
message BoundingBox {
  float x = 1;
  float y = 2;
  float width = 3;
  float height = 4;
}

// SP0 integration fixture (NOT a domain message): deliberately exercises BOTH
// extern code paths — `range` is an extern message that itself nests an extern
// `Timebase`, and `timebase` is a direct singular extern message field. The two
// timebases are independent by design (no authoritative-source semantics); this
// type exists only to prove the buffa <-> mediatime extern pipeline round-trips.
message TimedDetection {
  Detection detection = 1;
  mediatime.v1.TimeRange range = 2;
  mediatime.v1.Timebase timebase = 3;
}

// Normalized 2D point (x, y).
message Point2D { float x = 1; float y = 2; }

// Pixel dimensions (split from findit-proto's packed u16|u16 — clean redesign).
message Dimensions { uint32 width = 1; uint32 height = 2; }

// Image aesthetics score (VNCalculateImageAestheticsScoresRequest).
message Aesthetics { float overall_score = 1; bool is_utility = 2; }

// Detected horizon line (VNDetectHorizonRequest): signed angle + confidence.
message HorizonInfo { float angle = 1; float confidence = 2; }

// Opaque FFmpeg AVCodecID codec identifier.
message CodecId { int64 value = 1; }

// Perceptual feature vector (VNGenerateImageFeaturePrintRequest).
message FeaturePrint { bytes data = 1; uint32 element_type = 2; }

// Container/video file format.
enum VideoFormat {
  VIDEO_FORMAT_UNSPECIFIED = 0;
  VIDEO_FORMAT_AVI = 1; VIDEO_FORMAT_FLV = 2; VIDEO_FORMAT_MP4 = 3;
  VIDEO_FORMAT_M4V = 4; VIDEO_FORMAT_MKV = 5; VIDEO_FORMAT_MOV = 6;
  VIDEO_FORMAT_MXF = 7; VIDEO_FORMAT_MTS = 8; VIDEO_FORMAT_TS = 9;
  VIDEO_FORMAT_WMV = 10; VIDEO_FORMAT_WEBM = 11;
}

// Audio file format.
enum AudioFormat {
  AUDIO_FORMAT_UNSPECIFIED = 0;
  AUDIO_FORMAT_MP3 = 1; AUDIO_FORMAT_AAC = 2; AUDIO_FORMAT_FLAC = 3;
  AUDIO_FORMAT_WAV = 4; AUDIO_FORMAT_OGG = 5; AUDIO_FORMAT_WMA = 6;
  AUDIO_FORMAT_M4A = 7; AUDIO_FORMAT_OPUS = 8; AUDIO_FORMAT_AIFF = 9;
}

// Either a video or an audio format.
message MediaKind {
  oneof kind { VideoFormat video = 1; AudioFormat audio = 2; }
}

// Detected document region as a quadrilateral (4 corners) + confidence.
message DocumentSegment {
  Point2D top_left = 1; Point2D top_right = 2;
  Point2D bottom_left = 3; Point2D bottom_right = 4;
  float confidence = 5;
}

// Stable identifier (16-byte UUIDv7).
message Id { bytes value = 1; }

// Content hash (32-byte blake3-256).
message FileChecksum { bytes value = 1; }

// A path on a local volume: volume Id + path components.
message Local {
  Id volume = 1;
  repeated string components = 2;
}

// A resolved storage location.
message Location {
  oneof kind { Local local = 1; }
}

// An unresolved storage target (pre-volume-resolution).
message LocationTarget {
  oneof kind { string local = 1; }
}

// A content-addressed path: checksum + location.
message AppPathBuf {
  FileChecksum checksum = 1;
  Location location = 2;
}

// A user tag: name + packed RGBA color.
message Tag { string name = 1; fixed32 color = 2; }

// A structured error: numeric code + message.
message ErrorInfo { uint32 code = 1; string message = 2; }

// Analysis-run reproducibility — which model / prompt / indexer produced
// this analysis record, so a re-run on upgrade is deterministic. Locked
// shared cross-cutting VO (see `schema/README.md`). Carried by every
// analysis record that needs to record its production model + version;
// empty (all-`""`) is the canonical "not yet recorded" state.
message Provenance {
  string model_name = 1;
  string model_version = 2;
  string prompt_version = 3;
  string indexer_version = 4;
}

// Voice-embedding metadata. The actual vector lives in an external
// vector store (LanceDB / Qdrant / Milvus / pgvector / …); this message
// is the linkage + provenance kept in the wire model. Vendor-neutral:
// `vector_id` is opaque to the wire contract.
//
// Embedded into `Person.voiceprint` as `optional VoiceFingerprint`, and
// (once their wire messages land) into `Speaker.voiceprint` and
// `AudioSegment.voice_fingerprint`.
message VoiceFingerprint {
  bytes vector_id = 1;
  uint32 dimensions = 2;
  // ms since Unix epoch.
  int64 extracted_at = 3;
  // `optional` so "model did not expose a confidence" distinguishes from
  // a real 0.0.
  optional float confidence = 4;
  Provenance provenance = 5;
}

// Whether a `Person`'s identification is user-confirmed or auto-matched.
// Mirrors the domain `PersonConfidence` enum (see `schema/person.md`).
enum PersonConfidence {
  PERSON_CONFIDENCE_AUTO_MATCHED = 0;
  PERSON_CONFIDENCE_USER_CONFIRMED = 1;
}

// Cross-track / cross-modality identity anchor. One `Person` ↔ many
// `Speaker`s (one per track they appear in). Modality-neutral so a
// future face-side identity can hang off the same aggregate.
message Person {
  bytes id = 1;
  string name = 2;       // "" = unnamed
  PersonConfidence confidence = 3;
  optional VoiceFingerprint voiceprint = 4;
  // ms since Unix epoch.
  int64 created_at = 5;
  // ms since Unix epoch.
  int64 updated_at = 6;
}

// Source / translated string pair. "" = absent (empty-string sentinel),
// not Null — matches the SmolStr empty-means-absent domain convention.
// Locked shared cross-cutting VO (see `schema/README.md`); embedded in
// `AudioSegment.text` (and future VLM-narrative parents).
message LocalizedText {
  string src = 1;
  string translated = 2;
}

// BCP-47 language tag wrapper (mediaframe `lang::Language`). "" or "und"
// = unspecified; the wire form is the smallest round-trip surface
// (`Language::from_bcp47` / `to_bcp47`).
message Language {
  string bcp47 = 1;
}

// Word-level timing + score (`asry` output; producer-agnostic). `score`
// is `[0,1]` and always present (NaN-free per locked spec); per-word
// `language` carries code-switch / multilingual cues — `None` =
// inherits the segment language.
message Word {
  string text = 1;
  mediatime.v1.TimeRange span = 2;
  float score = 3;
  optional Language language = 4;
}

// Per-track diarized speaker (locked `schema/speaker.md`). `audio_track_id`
// references the `AudioTrack.id`. `person_id` (when set) references the
// `Person.id` — cross-track identity. `voiceprint` is the per-track
// aggregated centroid (per-segment fingerprints live on
// `AudioSegment.voice_fingerprint`).
message Speaker {
  bytes id = 1;
  bytes audio_track_id = 2;
  uint32 cluster_id = 3;
  string name = 4;
  optional mediatime.v1.Timestamp speech_duration = 5;
  optional VoiceFingerprint voiceprint = 6;
  optional bytes person_id = 7;
}

// One reconciled `dia ⋈ asry` speak range of an `AudioTrack` (locked
// `schema/audio_segments.md`). `audio_track_id` references the
// `AudioTrack.id`. `speaker_id` (when set) references a `Speaker.id`.
// `voice_fingerprint` is the per-segment embedding (aggregates upward
// into `Speaker.voiceprint`).
message AudioSegment {
  bytes id = 1;
  bytes audio_track_id = 2;
  uint32 index = 3;
  mediatime.v1.TimeRange span = 4;
  optional bytes speaker_id = 5;
  LocalizedText text = 6;
  optional Language language = 7;
  repeated Word words = 8;
  optional float no_speech_prob = 9;
  optional float avg_logprob = 10;
  optional float temperature = 11;
  optional VoiceFingerprint voice_fingerprint = 12;
}

// A watched media location with indexing progress counters.
message WatchedLocation {
  Id id = 1;
  Location location = 2;
  string name = 3;
  uint32 status = 4;            // LocationStatus bitflags (ACTIVE=1, TOMBSTONED=2)
  int64 created_at = 5;
  optional int64 deleted_at = 6;
  uint64 total_files = 7;
  uint64 indexed_files = 8;
  uint64 total_videos = 9;
  uint64 indexed_videos = 10;
  uint64 total_scenes = 11;
  uint64 total_audios = 12;
  uint64 indexed_audios = 13;
  uint64 total_failed_files = 14;
  uint64 failed_videos = 15;
  uint64 failed_audios = 16;
}

// Metadata for a storage volume.
message VolumeMeta {
  Id id = 1;
  Location location = 2;
  string name = 3;
  uint64 total_size = 4;
  uint64 used_size = 5;
  uint32 status = 6;            // VolumeStatus bitflags (EJECTABLE=1, ACTIVE=2)
}

// Single-Detection envelope: image-level classification result.
message ClassificationDetection { Detection detection = 1; }
// Single-Detection envelope: detected action/activity.
message ActionDetection { Detection detection = 1; }
// Single-Detection envelope: detected emotion.
message EmotionDetection { Detection detection = 1; }
// Single-Detection envelope: scene mood/atmosphere.
message MoodDetection { Detection detection = 1; }
// Single-Detection envelope: lighting condition.
message LightingDetection { Detection detection = 1; }
// Single-Detection envelope: dominant color (confidence = dominance).
message ColorDetection { Detection detection = 1; }

// A detected object: classification + optional bounding box.
message ObjectDetection {
  Detection detection = 1;
  optional BoundingBox bbox = 2;
}
// A detected subject (e.g. Human/Cat): classification + bounding box.
message SubjectDetection {
  Detection detection = 1;
  BoundingBox bbox = 2;
}
// Recognized text with location.
message TextDetection {
  string text = 1;
  float confidence = 2;
  BoundingBox bbox = 3;
}
// Decoded barcode/QR with location.
message BarcodeDetection {
  string payload = 1;
  string symbology = 2;
  float confidence = 3;
  BoundingBox bbox = 4;
}
// Detected face with pose angles.
message FaceDetection {
  BoundingBox bbox = 1;
  float confidence = 2;
  float capture_quality = 3;
  float roll = 4;
  float yaw = 5;
  float pitch = 6;
}
// A salient region of interest.
message SaliencyRegion {
  BoundingBox bbox = 1;
  float confidence = 2;
}

// A single 2D landmark point on a face.
message FaceLandmarkPoint { float x = 1; float y = 2; }
// A named region of face landmarks (e.g. "left_eye", "nose").
message FaceLandmarkRegion {
  string name = 1;
  repeated FaceLandmarkPoint points = 2;
}
// Face landmark detection result: bbox + confidence + named regions.
message FaceLandmarksDetection {
  BoundingBox bbox = 1;
  float confidence = 2;
  repeated FaceLandmarkRegion regions = 3;
}
// A single body-pose joint with 2D position and confidence.
message BodyPoseJoint {
  string name = 1; float x = 2; float y = 3; float confidence = 4;
}
// Body pose detection result: bbox + confidence + joint list.
message BodyPoseDetection {
  BoundingBox bbox = 1;
  float confidence = 2;
  repeated BodyPoseJoint joints = 3;
}
// A single 3D body-pose joint with x/y/z position and confidence.
message BodyPose3DJoint {
  string name = 1; float x = 2; float y = 3; float z = 4; float confidence = 5;
}
// Method used to obtain the body height estimate in BodyPose3DDetection.
enum BodyPose3DHeightEstimation {
  BODY_POSE_3D_HEIGHT_ESTIMATION_UNSPECIFIED = 0;
  BODY_POSE_3D_HEIGHT_ESTIMATION_REFERENCE = 1;
  BODY_POSE_3D_HEIGHT_ESTIMATION_MEASURED = 2;
}
// 3D body pose detection: confidence + height + estimation method + joint list.
message BodyPose3DDetection {
  float confidence = 1;
  float body_height = 2;
  BodyPose3DHeightEstimation height_estimation = 3;
  repeated BodyPose3DJoint joints = 4;
}
// Chirality (handedness) of a detected hand.
enum HandChirality {
  HAND_CHIRALITY_UNSPECIFIED = 0;
  HAND_CHIRALITY_LEFT = 1;
  HAND_CHIRALITY_RIGHT = 2;
}
// Hand pose detection result: bbox + confidence + chirality + joint list.
message HandPoseDetection {
  BoundingBox bbox = 1;
  float confidence = 2;
  HandChirality chirality = 3;
  repeated BodyPoseJoint joints = 4;
}
// Person segmentation mask: bbox + confidence + pixel dimensions + mask bytes.
message PersonSegmentationMask {
  BoundingBox bbox = 1;
  float confidence = 2;
  Dimensions dimensions = 3;
  bytes data = 4;
}
// Per-instance person mask: bbox + confidence + instance index + dimensions + mask bytes.
message PersonInstanceMaskDetection {
  BoundingBox bbox = 1;
  float confidence = 2;
  uint32 instance_index = 3;
  Dimensions dimensions = 4;
  bytes data = 5;
}
// Source of timing information for a media track.
enum TrackTimeSource {
  TRACK_TIME_SOURCE_UNSPECIFIED = 0;
  TRACK_TIME_SOURCE_DECLARED = 1;
  TRACK_TIME_SOURCE_PACKET_OBSERVED = 2;
  TRACK_TIME_SOURCE_DECODED_OBSERVED = 3;
}
// Timing ranges for a media track: declared, packet-observed, and decoded-observed.
message TrackTime {
  optional mediatime.v1.TimeRange declared = 1;
  optional mediatime.v1.TimeRange packet_observed = 2;
  optional mediatime.v1.TimeRange decoded_observed = 3;
}
// Animal analysis aggregate: subject detections + body poses.
message AnimalAnalysis {
  repeated SubjectDetection subjects = 1;
  repeated BodyPoseDetection body_poses = 2;
}
// Human analysis aggregate: subjects, faces, body/hand poses, 3D poses, masks, landmarks, and segmentation.
message HumanAnalysis {
  repeated SubjectDetection subjects = 1;
  repeated FaceDetection faces = 2;
  repeated BodyPoseDetection body_poses = 3;
  repeated HandPoseDetection hand_poses = 4;
  repeated BodyPose3DDetection body_poses_3d = 5;
  repeated PersonInstanceMaskDetection instance_masks = 6;
  repeated FaceDetection face_rectangles = 7;
  repeated FaceLandmarksDetection face_landmarks = 8;
  repeated PersonSegmentationMask segmentation_masks = 9;
}

// ── SP2: findit `database` domain (consolidated into media.v1) ──────────────
//
// SP2 — findit `database` domain. Authored from findit-proto's
// src/database/ Rust as a clean proto3 redesign (NO wire-compat with the
// hand-rolled encoding; correctness = round-trip + semantic fidelity).
//
// REUSE, NEVER REDEFINE: every type below is same-package (media.v1).
// Same-package (media.v1) since the mono-consolidation; the SP2 `MediaKind` enum is named `DbMediaKind` to avoid colliding with SP1's `MediaKind` oneof.

// Task-0 codegen smoke fixture (NOT a domain message): proves the
// SP2 database-domain same-package reference (message + enum), the
// inline-bytes id convention, and the mediatime.v1.TimeRange extern, all
// resolving in a single buffa codegen run. Kept permanently: it is the
// regression guard for the SP2 codegen pipeline (mirrors SP0's
// TimedDetection fixture role).
message Sp2CodegenSmoke {
  bytes id = 1;                              // inline-bytes id convention
  ErrorInfo error = 2;              // same-package MESSAGE ref (was cross-package media.v1)
  VideoFormat format = 3;           // same-package ENUM ref (was cross-package media.v1)
  optional mediatime.v1.TimeRange range = 4; // mediatime extern (-> ::mediatime)
}

