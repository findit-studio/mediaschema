syntax = "proto3";

package media.v1;

// Shapes are authored from findit-proto's Rust structs but are a clean
// redesign: wire compatibility with findit-proto's hand-rolled encoding is a
// deliberate NON-goal (correctness / round-trip only).

import "mediatime/v1/mediatime.proto";

// Classification result: a label and its confidence score.
message Detection {
  string label = 1;
  float confidence = 2;
}

// Normalized image rectangle (x, y, width, height in [0, 1]).
message BoundingBox {
  float x = 1;
  float y = 2;
  float width = 3;
  float height = 4;
}

// SP0 integration fixture (NOT a domain message): deliberately exercises BOTH
// extern code paths — `range` is an extern message that itself nests an extern
// `Timebase`, and `timebase` is a direct singular extern message field. The two
// timebases are independent by design (no authoritative-source semantics); this
// type exists only to prove the buffa <-> mediatime extern pipeline round-trips.
message TimedDetection {
  Detection detection = 1;
  mediatime.v1.TimeRange range = 2;
  mediatime.v1.Timebase timebase = 3;
}

// Normalized 2D point (x, y).
message Point2D { float x = 1; float y = 2; }

// Pixel dimensions (split from findit-proto's packed u16|u16 — clean redesign).
message Dimensions { uint32 width = 1; uint32 height = 2; }

// Image aesthetics score (VNCalculateImageAestheticsScoresRequest).
message Aesthetics { float overall_score = 1; bool is_utility = 2; }

// Detected horizon line (VNDetectHorizonRequest): signed angle + confidence.
message HorizonInfo { float angle = 1; float confidence = 2; }

// Opaque FFmpeg AVCodecID codec identifier.
message CodecId { int64 value = 1; }

// Perceptual feature vector (VNGenerateImageFeaturePrintRequest).
message FeaturePrint { bytes data = 1; uint32 element_type = 2; }

// Container/video file format.
enum VideoFormat {
  VIDEO_FORMAT_UNSPECIFIED = 0;
  VIDEO_FORMAT_AVI = 1; VIDEO_FORMAT_FLV = 2; VIDEO_FORMAT_MP4 = 3;
  VIDEO_FORMAT_M4V = 4; VIDEO_FORMAT_MKV = 5; VIDEO_FORMAT_MOV = 6;
  VIDEO_FORMAT_MXF = 7; VIDEO_FORMAT_MTS = 8; VIDEO_FORMAT_TS = 9;
  VIDEO_FORMAT_WMV = 10; VIDEO_FORMAT_WEBM = 11;
}

// Audio file format.
enum AudioFormat {
  AUDIO_FORMAT_UNSPECIFIED = 0;
  AUDIO_FORMAT_MP3 = 1; AUDIO_FORMAT_AAC = 2; AUDIO_FORMAT_FLAC = 3;
  AUDIO_FORMAT_WAV = 4; AUDIO_FORMAT_OGG = 5; AUDIO_FORMAT_WMA = 6;
  AUDIO_FORMAT_M4A = 7; AUDIO_FORMAT_OPUS = 8; AUDIO_FORMAT_AIFF = 9;
}

// Either a video or an audio format.
message MediaKind {
  oneof kind { VideoFormat video = 1; AudioFormat audio = 2; }
}

// Detected document region as a quadrilateral (4 corners) + confidence.
message DocumentSegment {
  Point2D top_left = 1; Point2D top_right = 2;
  Point2D bottom_left = 3; Point2D bottom_right = 4;
  float confidence = 5;
}

// Stable identifier (16-byte UUIDv7).
message Id { bytes value = 1; }

// Content hash (32-byte blake3-256).
message FileChecksum { bytes value = 1; }

// A path on a local volume: volume Id + path components.
message Local {
  Id volume = 1;
  repeated string components = 2;
}

// A resolved storage location.
message Location {
  oneof kind { Local local = 1; }
}

// An unresolved storage target (pre-volume-resolution).
message LocationTarget {
  oneof kind { string local = 1; }
}

// A content-addressed path: checksum + location.
message AppPathBuf {
  FileChecksum checksum = 1;
  Location location = 2;
}

// A user tag: name + packed RGBA color.
message Tag { string name = 1; fixed32 color = 2; }

// A structured error: numeric code + message.
message ErrorInfo { uint32 code = 1; string message = 2; }
