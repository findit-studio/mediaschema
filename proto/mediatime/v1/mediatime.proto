syntax = "proto3";

package mediatime.v1;

// Rational media timebase. Maps to ::mediatime::Timebase via extern_path.
message Timebase {
  uint32 num = 1;
  uint32 den = 2;
}

// Half-open [start, end) range in a Timebase. -> ::mediatime::TimeRange
message TimeRange {
  int64 start = 1;
  int64 end = 2;
  Timebase timebase = 3;
}

// A point in time in a Timebase. -> ::mediatime::Timestamp
message Timestamp {
  int64 pts = 1;
  Timebase timebase = 2;
}
